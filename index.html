<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Web Catur - Stockfish Lokal</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css" />
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f4f9; padding-top: 20px; }
        #myBoard { width: 400px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        #status { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Latihan Catur vs Bot Lokal</h2>
    <div id="myBoard"></div>
    <div id="status">Memuat bot...</div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        // Menggunakan Worker agar bot berjalan di latar belakang (tidak membekukan web)
        var stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/16.0.0/stockfish.js');

        function onDrop(source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            
            board.position(game.fen());
            $('#status').html('Bot sedang berpikir...');
            
            // Perintah ke Stockfish
            stockfish.postMessage('position fen ' + game.fen());
            stockfish.postMessage('go depth 12');
        }

        stockfish.onmessage = function(event) {
            if (event.data.startsWith('bestmove')) {
                var bestMove = event.data.split(' ')[1];
                game.move({
                    from: bestMove.substring(0, 2),
                    to: bestMove.substring(2, 4),
                    promotion: 'q'
                });
                board.position(game.fen());
                $('#status').html('Giliran Anda');
            }
        };

        var config = {
            draggable: true,
            position: 'start',
            onDrop: onDrop,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };
        board = Chessboard('myBoard', config);
        
        // Inisialisasi bot
        stockfish.postMessage('uci');
        $('#status').html('Bot Siap. Silakan jalan!');
    </script>
</body>
</html>
